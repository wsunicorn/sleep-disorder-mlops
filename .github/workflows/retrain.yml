name: Manual Retrain Trigger

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Lý do retrain (ví dụ: data drift detected)"
        required: false
        default: "Manual trigger"

env:
  AWS_REGION: ap-southeast-1
  ECS_CLUSTER: sleep-portal-cluster

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger retrain ECS task
        run: |
          echo "Triggering retrain: ${{ github.event.inputs.reason }}"
          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition sleep-portal-task \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-045cfee5dd9f717c9,subnet-05c7350c915514a4c],securityGroups=[sg-09b79fe4b58c9b329],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"sleep-portal","command":["python","training/train.py","--retrain"]}]}' \
            --query "tasks[0].taskArn" --output text

      - name: Notify
        run: echo "Retrain task submitted at $(date -u)"
